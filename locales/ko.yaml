optDescAlignComments: 항목과 배열 항목 뒤의 연속된 주석을 세로로 정렬합니다. 항목 또는 배열 항목 뒤에 있는 주석에만 적용됩니다.
optDescAlignEntries: 연속된 항목을 세로로 정렬합니다.
optDescAllowedBlankLines: 항목과 테이블 사이에 허용되는 최대 빈 줄 수를 지정합니다.
optDescArrayAutoCollapse: 최대 열 너비를 넘지 않고 주석이 없는 배열을 자동으로 접습니다.
optDescArrayAutoExpand: 최대 열 너비를 초과하는 배열을 자동으로 여러 줄로 펼칩니다.
optDescArrowParens: 단일 매개변수 화살표 함수 매개변수에 괄호를 포함합니다.
optDescAutoFormat: 붙여넣기 후 소스 코드를 자동으로 포맷합니다.
optDescBraceStyle: 코드 블록(클래스와 함수)의 스타일을 공백 또는 줄바꿈으로 지정합니다.
optDescBracketSameLine: 여러 줄 HTML(HTML, JSX, Vue, Angular) 요소의 > 를 다음 줄 단독이 아닌 마지막 줄 끝에 배치합니다(셀프 클로징 요소에는 적용되지 않음).
optDescBracketSpacing: 객체 리터럴의 괄호 사이에 공백을 출력합니다.
optDescCompactArrays: 단일 줄 배열의 공백 패딩을 생략합니다.
optDescCompactEntries: = 주변 공백을 생략합니다.
optDescCompactInlineTables: 인라인 테이블 시작과 끝의 공백 패딩을 생략합니다.
optDescDebug: 런타임 정보를 콘솔에 기록할지 여부입니다.
optDescEndOfLine: 줄바꿈 스타일을 지정합니다.
optDescEntrypoint: 엔트리포인트부터 포맷하여 스니펫에도 prettier 를 적용할 수 있게 합니다.
optDescExperimentalOperatorPosition: 이항 표현식이 줄바꿈될 때 연산자 위치를 지정합니다.
optDescExperimentalTernaries: 삼항 연산자 스타일을 지정합니다.
optDescHtmlWhitespaceSensitivity: HTML, Vue, Angular, Handlebars 의 전역 공백 민감도를 지정합니다.
optDescIndentEntries: 테이블 아래 항목을 들여쓰기합니다.
optDescIndentTables: 테이블과 테이블 배열 및 그 하위 테이블을 기준으로 들여쓰기합니다. 순서가 맞지 않는 하위 테이블은 들여쓰지 않습니다.
optDescJsxSingleQuote: JSX 에서 큰따옴표 대신 작은따옴표를 사용합니다.
optDescObjectWrap: 객체 리터럴 줄바꿈 방식을 지정합니다.
optDescPhpVersion: 최소 대상 PHP 버전을 지정합니다.
optDescPrintWidth: 프린터가 줄바꿈할 줄 길이를 지정합니다.
optDescQuoteProps: 객체 속성에 따옴표를 언제 붙일지 변경합니다.
optDescReorderKeys: 빈 줄로 구분되지 않은 키를 알파벳 순으로 재정렬합니다.
optDescSemi: 문장 끝에 세미콜론을 출력합니다.
optDescSilent: 사용자 작업 후 토스트 메시지를 표시할지 여부입니다.
optDescSingleAttributePerLine: HTML, Vue, JSX 에서 한 줄당 하나의 속성을 강제합니다.
optDescSingleQuote: 큰따옴표 대신 작은따옴표를 사용합니다.
optDescSvelteAllowShorthand: 속성명과 표현식이 같을 때 컴포넌트 속성 축약 구문을 활성화/비활성화합니다.
optDescSvelteIndentScriptAndStyle: Svelte 파일의 <script> 및 <style> 태그 내부 코드를 들여쓸지 여부입니다.
optDescSvelteSortOrder: scripts, markup, styles 의 정렬 순서를 지정합니다.
optDescTabWidth: 들여쓰기 레벨당 공백 수를 지정합니다.
optDescTrailingComma: 여러 줄 쉼표 구분 구문에서 가능한 곳에 후행 쉼표를 출력합니다.
optDescTrailingCommaPHP: 여러 줄일 때 가능한 곳에 후행 쉼표를 출력합니다.
optDescUseTabs: 공백 대신 탭으로 들여쓰기합니다.
optDescVueIndentScriptAndStyle: Vue 파일의 <script> 및 <style> 태그 내부 코드를 들여쓸지 여부입니다.
optDescXmlQuoteAttributes: XML 속성 따옴표 스타일을 지정합니다.
optDescXmlSelfClosingSpace: 셀프 클로징 태그 앞에 공백을 추가합니다.
optDescXmlSortAttributesByKey: xmlns 속성을 우선하면서 XML 속성을 키 기준 알파벳 순으로 정렬합니다.
optDescXmlWhitespaceSensitivity: XML 공백 처리 방식을 지정합니다.
